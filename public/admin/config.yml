backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

locale: "el"

collections:
  - name: "blog"
    label: "Άρθρα Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Τίτλος", name: "title", widget: "string" }
      - { label: "Περιγραφή (SEO)", name: "description", widget: "string" }
      - { label: "Ημερομηνία", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY" }
      - { label: "Συγγραφέας", name: "author", widget: "string", default: "BioClean Pro" }
      - label: "Κατηγορία"
        name: "category"
        widget: "select"
        options:
          - "Γενικά"
          - "Κατσαρίδες"
          - "Κοριοί"
          - "Ποντίκια"
          - "Απολυμάνσεις"
          - "Βιολογικοί Καθαρισμοί"
          - "Ασφάλεια"
          - "Πρόληψη"
      - { label: "Προτεινόμενο", name: "featured", widget: "boolean", default: false }
      - { label: "Περιεχόμενο", name: "body", widget: "markdown" }
